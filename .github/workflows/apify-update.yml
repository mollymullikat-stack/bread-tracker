name: Update mentions from Apify

on:
  schedule:
    - cron: "0 2 * * 1"   # ทุกวันจันทร์ 09:00 เวลาไทย (~$0.35/รอบ)
  workflow_dispatch: {}    # กดรันเองได้จากแท็บ Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull fresh data from Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python scripts/update_mentions.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet data.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "apify-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Auto-update mentions from Apify ($(TZ=Asia/Bangkok date +%F))"
          git push
